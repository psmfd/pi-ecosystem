name: dashboard

# Rebuilds the static dashboard from the psmfd Projects v2 board (#3) and each
# repo's latest release, then publishes to GitHub Pages.
#
# All third-party actions are pinned to a full commit SHA (immutable), never a
# floating tag/branch. When bumping a version, re-resolve the SHA, e.g.:
#   gh api repos/actions/checkout/git/ref/tags/v7.0.0 --jq '.object.sha'
# and update both the SHA and the trailing version comment.

on:
  schedule:
    - cron: "0 * * * *"     # hourly (safety net; release.yml dispatch refreshes instantly)
  workflow_dispatch:
  # Fired by psmfd/pi_config's release.yml right after a release is cut, so the
  # dashboard reflects the new version immediately instead of waiting for the
  # 6-hourly cron. Sender must hold a token scoped to this repo (the org
  # mirror-sync App with pi-ecosystem in its installation, ADR-0061/0064).
  repository_dispatch:
    types: [release-published]

permissions:
  contents: read

# Serialize Pages publishes; let an in-progress run finish (don't cancel a deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dashboard
        env:
          # PAT with Projects:read + Contents:read — the default GITHUB_TOKEN
          # cannot read Projects v2. See README "Setup".
          GH_TOKEN: ${{ secrets.CATALOG_PAT }}
        run: ./scripts/build-dashboard.sh
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
